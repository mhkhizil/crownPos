name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.82.249.130
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /home/admin/flexusedmarket/flexUsedItemSellingAppBe

            sudo systemctl stop flex-used-market-be.service
            
            # 1. Update source code
            git pull origin main
            
            # 2. Install dependencies (clean install)
            npm ci
            
            # 3. Generate Prisma Client
            npx prisma generate
            
            # 4. Build with increased memory limit
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm run build
            
            # 5. Run database migrations
            npx prisma migrate deploy
            
            # 6. Locate the actual main.js (handles dist/main.js or dist/src/main.js)
            ACTUAL_PATH=$(find dist -name main.js | head -n 1)
            
            if [ -z "$ACTUAL_PATH" ]; then
              echo "❌ Build failed: main.js not found anywhere in dist/."
              exit 1
            fi

            FULL_PATH="/home/admin/flexusedmarket/flexUsedItemSellingAppBe/$ACTUAL_PATH"
            echo "✅ Found build entry point at: $FULL_PATH"

            # 7. Dynamically update the systemd service file if the path is wrong
            # This ensures the service always points to where the build actually is
            sudo sed -i "s|ExecStart=.*|ExecStart=/usr/bin/node $FULL_PATH|" /etc/systemd/system/flex-used-market-be.service
            
            # 8. Reload and Restart
            echo "🚀 Restarting service..."
            sudo systemctl daemon-reload
            sudo systemctl start flex-used-market-be.service
            sudo systemctl restart flex-used-market-be.service
            
            # 9. Health Check
            sleep 2
            sudo systemctl status flex-used-market-be.service --no-pager
